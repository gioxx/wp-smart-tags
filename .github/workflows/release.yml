name: Release

on:
  push:
    branches: [main]
    paths:
      - ai-tags-optimizer.php

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -m1 '^ \* Version:' ai-tags-optimizer.php | sed -E 's/.*Version:\s*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.check.outputs.exists == 'false'
        run: |
          SLUG=smart-tags-optimizer
          STAGING="/tmp/$SLUG"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          git ls-files \
            | grep -v '^\.github/' \
            | grep -v '^\.gitignore$' \
            | grep -v '^README\.it\.md$' \
            | rsync -a --files-from=- . "$STAGING/"
          cd /tmp
          zip -r -q "$SLUG-${{ steps.version.outputs.version }}.zip" "$SLUG"

      - name: Extract changelog section
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "See CHANGELOG.md." > /tmp/release-notes.md
          fi
          {
            echo ""
            echo "For the full version history, see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)."
          } >> /tmp/release-notes.md

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "/tmp/smart-tags-optimizer-${{ steps.version.outputs.version }}.zip" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
